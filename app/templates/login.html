{% extends "base.html" %}

{% block title %}Crear Nuevo Curso{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 style-form" style="max-width: 450px; width: 100%; border-radius: 15px;">
        
        <!-- Encabezado del Formulario -->
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">¡Bienvenido!</h2>
            <p class="text-muted">Ingresa tus credenciales para acceder</p>
        </div>

        <!-- Formulario -->
        <form action="" method="POST" novalidate>
            
            <!-- Campo: Correo Electrónico -->
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="nombre@ejemplo.com" required>
                <div class="form-text">Nunca compartiremos tu correo con nadie.</div>
            </div>

            <!-- Campo: Contraseña -->
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
            </div>

            <!-- Checkbox: Recordarme -->
            <div class="mb-3 form-check d-flex justify-content-between">
                <div>
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label text-muted" for="remember">Recordarme</label>
                </div>
                <a href="#" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
            </div>

            <!-- Botón de Envío (Usa tu clase .btn-neon de CSS si quieres) -->
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-2" style="border-radius: 8px;">
                Iniciar Sesión
            </button>
            
        </form>

        <!-- Registro alternativo -->
        <div class="text-center mt-4">
            <p class="mb-0 text-muted">¿No tienes cuenta? <a href="#" class="text-decoration-none fw-bold">Regístrate aquí</a></p>
        </div>

    </div>
</div>
{% endblock %}
